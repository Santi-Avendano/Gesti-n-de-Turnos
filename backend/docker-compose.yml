services:
  postgres:
    image: postgres:16-alpine
    container_name: turnero-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: turnero
      POSTGRES_PASSWORD: turnero
      POSTGRES_DB: turnero
    ports:
      - "5432:5432"
    volumes:
      - turnero-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnero -d turnero"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  turnero-pg-data:
